<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>p4 Build Env</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #1a1a2e;
        font-family: system-ui, sans-serif;
      }

      /* Presentation fills the left portion of the viewport. */
      #theContainer {
        position: fixed;
        left: 0;
        top: 0;
        right: 280px;
        bottom: 0;
        overflow: hidden;
      }

      /* Right panel — editor controls and trigger HUD. */
      #rightPanel {
        position: fixed;
        top: 0;
        right: 0;
        width: 280px;
        height: 100%;
        background: #12122a;
        border-left: 1px solid hsl(220 30% 30%);
        padding: 16px 12px;
        overflow-y: auto;
        color: #cdd;
      }

      .panel-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: hsl(220 40% 55%);
        margin-bottom: 10px;
      }

      /* ── Mode switcher ────────────────────────────────── */

      .mode-buttons {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
      }

      .mode-buttons button {
        flex: 1;
        padding: 5px 4px;
        border: 1px solid hsl(220 30% 30%);
        border-radius: 4px;
        background: hsl(220 20% 15%);
        color: hsl(220 30% 60%);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.1s,
          color 0.1s,
          border-color 0.1s;
      }

      .mode-buttons button[data-active="true"] {
        background: hsl(220 60% 30%);
        color: #eef;
        border-color: hsl(220 60% 50%);
      }

      .mode-buttons button:hover:not([data-active="true"]) {
        background: hsl(220 25% 20%);
        color: #cdd;
      }

      /* ── Selection panel ──────────────────────────────── */

      .selection-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }

      .selection-header .panel-label {
        margin: 0;
      }

      #selectionCount {
        font-size: 10px;
        font-weight: 700;
        color: hsl(220 80% 70%);
        background: hsl(220 40% 22%);
        padding: 1px 6px;
        border-radius: 10px;
      }

      .sel-empty {
        font-size: 11px;
        color: hsl(220 20% 45%);
        font-style: italic;
        margin-bottom: 4px;
      }

      .sel-item {
        font-size: 11px;
        color: #cdd;
        padding: 4px 6px;
        margin-bottom: 4px;
        background: hsl(220 25% 18%);
        border-radius: 3px;
        border-left: 2px solid hsl(220 70% 55%);
      }

      .panel-hint {
        font-size: 10px;
        color: hsl(220 20% 38%);
        margin-top: 6px;
        margin-bottom: 4px;
      }

      .panel-divider {
        height: 1px;
        background: hsl(220 20% 22%);
        margin: 16px 0;
      }

      /* ── Utility buttons ──────────────────────────────── */

      .util-button {
        display: block;
        width: 100%;
        padding: 6px 10px;
        border: 1px solid hsl(220 30% 30%);
        border-radius: 4px;
        background: hsl(220 20% 15%);
        color: hsl(220 30% 65%);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition:
          background 0.1s,
          color 0.1s;
      }

      .util-button:hover {
        background: hsl(220 25% 22%);
        color: #eef;
      }

      /* ── Trigger rows ─────────────────────────────────── */

      .trigger-row {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid hsl(220 20% 20%);
      }
      .trigger-row:last-child {
        border-bottom: none;
      }

      .trigger-name {
        font-size: 12px;
        font-weight: 600;
        color: #eef;
        margin-bottom: 6px;
      }

      .trigger-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .trigger-state {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 2px 6px;
        border-radius: 3px;
        background: hsl(220 20% 20%);
        color: hsl(220 40% 60%);
      }
      .trigger-state[data-state="ACTIVE"] {
        background: hsl(140 60% 25%);
        color: hsl(140 80% 70%);
      }
      .trigger-state[data-state="AFTER"] {
        background: hsl(30 60% 20%);
        color: hsl(30 80% 65%);
      }

      .trigger-pill {
        font-size: 11px;
        color: hsl(220 30% 60%);
        font-variant-numeric: tabular-nums;
        min-width: 32px;
      }

      .trigger-bar-track {
        height: 4px;
        background: hsl(220 20% 20%);
        border-radius: 2px;
        overflow: hidden;
      }
      .trigger-bar-fill {
        height: 100%;
        width: 0%;
        background: hsl(140 60% 45%);
        border-radius: 2px;
        transition: width 0.05s linear;
      }
    </style>
  </head>

  <body>
    <div id="theContainer"></div>

    <div id="rightPanel">
      <p class="panel-label">EDITOR</p>

      <div class="mode-buttons">
        <button id="modeEditor">Editor</button>
        <button id="modeAnchors">Anchors</button>
        <button id="modePlayer">Player</button>
      </div>

      <div class="selection-header">
        <p class="panel-label">SELECTION</p>
        <span id="selectionCount">0</span>
      </div>
      <div id="selectionList"></div>
      <p class="panel-hint">
        Click to select &nbsp;·&nbsp; Shift+click to add &nbsp;·&nbsp; Esc to
        clear
      </p>

      <div class="panel-divider"></div>

      <p class="panel-label">SERIALISATION</p>
      <button id="btnLogMemento" class="util-button">
        Log memento to console
      </button>

      <div class="panel-divider"></div>

      <p class="panel-label">SCROLL TRIGGERS</p>
      <div id="triggerHUD"></div>
    </div>
  </body>
</html>
