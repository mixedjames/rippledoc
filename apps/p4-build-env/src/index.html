<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>p4 Build Env</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f0f2f5;
        font-family: system-ui, sans-serif;
      }

      /* Left panel — style editor. */
      #leftPanel {
        position: fixed;
        left: 0;
        top: 0;
        width: 220px;
        height: 100%;
        background: #fff;
        border-right: 1px solid hsl(220 20% 85%);
        padding: 16px 12px;
        overflow-y: auto;
        color: #2c3042;
      }

      /* Presentation fills the centre of the viewport. */
      #theContainer {
        position: fixed;
        left: 220px;
        top: 0;
        right: 280px;
        bottom: 0;
        overflow: hidden;
      }

      /* Right panel — editor controls and trigger HUD. */
      #rightPanel {
        position: fixed;
        top: 0;
        right: 0;
        width: 280px;
        height: 100%;
        background: #fff;
        border-left: 1px solid hsl(220 20% 85%);
        padding: 16px 12px;
        overflow-y: auto;
        color: #2c3042;
      }

      .panel-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: hsl(220 50% 45%);
        margin-bottom: 10px;
      }

      /* ── Mode switcher ────────────────────────────────── */

      .mode-buttons {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
      }

      .mode-buttons button {
        flex: 1;
        padding: 5px 4px;
        border: 1px solid hsl(220 20% 82%);
        border-radius: 4px;
        background: hsl(220 20% 95%);
        color: hsl(220 30% 40%);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.1s,
          color 0.1s,
          border-color 0.1s;
      }

      .mode-buttons button[data-active="true"] {
        background: hsl(220 70% 55%);
        color: #fff;
        border-color: hsl(220 70% 45%);
      }

      .mode-buttons button:hover:not([data-active="true"]) {
        background: hsl(220 15% 90%);
        color: #2c3042;
      }

      /* ── Selection panel ──────────────────────────────── */

      .selection-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }

      .selection-header .panel-label {
        margin: 0;
      }

      #selectionCount {
        font-size: 10px;
        font-weight: 700;
        color: hsl(220 80% 40%);
        background: hsl(220 60% 93%);
        padding: 1px 6px;
        border-radius: 10px;
      }

      .sel-empty {
        font-size: 11px;
        color: hsl(220 15% 55%);
        font-style: italic;
        margin-bottom: 4px;
      }

      .sel-item {
        font-size: 11px;
        color: #2c3042;
        padding: 4px 6px;
        margin-bottom: 4px;
        background: hsl(220 50% 96%);
        border-radius: 3px;
        border-left: 2px solid hsl(220 70% 55%);
      }

      .panel-hint {
        font-size: 10px;
        color: hsl(220 15% 55%);
        margin-top: 6px;
        margin-bottom: 4px;
      }

      .panel-divider {
        height: 1px;
        background: hsl(220 15% 88%);
        margin: 16px 0;
      }

      /* ── Utility buttons ──────────────────────────────── */

      .util-button {
        display: block;
        width: 100%;
        padding: 6px 10px;
        border: 1px solid hsl(220 20% 82%);
        border-radius: 4px;
        background: hsl(220 20% 95%);
        color: hsl(220 30% 40%);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition:
          background 0.1s,
          color 0.1s;
      }

      .util-button:hover {
        background: hsl(220 15% 90%);
        color: #2c3042;
      }

      /* ── Trigger rows ─────────────────────────────────── */

      .trigger-row {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid hsl(220 15% 88%);
      }
      .trigger-row:last-child {
        border-bottom: none;
      }

      .trigger-name {
        font-size: 12px;
        font-weight: 600;
        color: #2c3042;
        margin-bottom: 6px;
      }

      .trigger-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .trigger-state {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 2px 6px;
        border-radius: 3px;
        background: hsl(220 15% 91%);
        color: hsl(220 40% 45%);
      }
      .trigger-state[data-state="ACTIVE"] {
        background: hsl(140 55% 88%);
        color: hsl(140 70% 28%);
      }
      .trigger-state[data-state="AFTER"] {
        background: hsl(30 55% 90%);
        color: hsl(30 70% 35%);
      }

      .trigger-pill {
        font-size: 11px;
        color: hsl(220 30% 45%);
        font-variant-numeric: tabular-nums;
        min-width: 32px;
      }

      .trigger-bar-track {
        height: 4px;
        background: hsl(220 15% 90%);
        border-radius: 2px;
        overflow: hidden;
      }
      .trigger-bar-fill {
        height: 100%;
        width: 0%;
        background: hsl(140 60% 45%);
        border-radius: 2px;
        transition: width 0.05s linear;
      }

      /* ── Style editor (left panel) ───────────────────── */

      .style-section-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: hsl(220 50% 40%);
        margin-top: 14px;
        margin-bottom: 8px;
      }
      .style-section-label:first-child {
        margin-top: 0;
      }

      .style-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 7px;
      }

      .style-label {
        font-size: 10px;
        color: hsl(220 20% 50%);
        min-width: 44px;
        flex-shrink: 0;
      }

      .style-row select,
      .style-row input[type="number"] {
        flex: 1;
        background: hsl(220 20% 97%);
        border: 1px solid hsl(220 20% 80%);
        border-radius: 3px;
        color: #2c3042;
        font-size: 11px;
        padding: 3px 5px;
        min-width: 0;
      }

      .style-row input[type="color"] {
        flex: 1;
        height: 24px;
        border: 1px solid hsl(220 20% 80%);
        border-radius: 3px;
        padding: 1px;
        background: hsl(220 20% 97%);
        cursor: pointer;
        min-width: 0;
      }

      .style-row input[type="checkbox"] {
        width: 14px;
        height: 14px;
        cursor: pointer;
        accent-color: hsl(220 70% 55%);
      }

      #styleEditorEmpty {
        font-size: 11px;
        color: hsl(220 15% 55%);
        font-style: italic;
        margin-top: 10px;
      }

      #styleEditorForm {
        display: none;
      }
      #styleEditorForm.active {
        display: block;
      }

      /* ── Anchor picked ────────────────────────────────── */

      #anchorPickedEmpty {
        font-size: 11px;
        color: hsl(220 15% 55%);
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <div id="leftPanel">
      <p class="panel-label">STYLES</p>
      <p id="styleEditorEmpty">Select an element to edit its style.</p>

      <div id="styleEditorForm">
        <p class="style-section-label">FILL</p>
        <div class="style-row">
          <label class="style-label" for="fillType">Type</label>
          <select id="fillType">
            <option value="none">None</option>
            <option value="solid">Solid</option>
          </select>
        </div>
        <div class="style-row" id="fillColorRow">
          <label class="style-label" for="fillColor">Color</label>
          <input type="color" id="fillColor" value="#ffffff" />
        </div>

        <p class="style-section-label">FONT</p>
        <div class="style-row">
          <label class="style-label" for="fontColor">Color</label>
          <input type="color" id="fontColor" value="#000000" />
        </div>
        <div class="style-row">
          <label class="style-label" for="fontSize">Size</label>
          <input
            type="number"
            id="fontSize"
            value="18"
            min="1"
            max="300"
            step="1"
          />
        </div>
        <div class="style-row">
          <label class="style-label" for="fontWeight">Weight</label>
          <select id="fontWeight">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="300">300</option>
            <option value="400">400</option>
            <option value="500">500</option>
            <option value="600">600</option>
            <option value="700">700</option>
            <option value="800">800</option>
            <option value="900">900</option>
          </select>
        </div>
        <div class="style-row">
          <label class="style-label" for="fontItalic">Italic</label>
          <input type="checkbox" id="fontItalic" />
        </div>

        <p class="style-section-label">BORDER</p>
        <div class="style-row">
          <label class="style-label" for="borderType">Type</label>
          <select id="borderType">
            <option value="none">None</option>
            <option value="border">Border</option>
          </select>
        </div>
        <div id="borderDetails">
          <div class="style-row">
            <label class="style-label" for="borderWidth">Width</label>
            <input
              type="number"
              id="borderWidth"
              value="1"
              min="0"
              max="50"
              step="1"
            />
          </div>
          <div class="style-row">
            <label class="style-label" for="borderStyle">Style</label>
            <select id="borderStyle">
              <option value="solid">Solid</option>
              <option value="dashed">Dashed</option>
              <option value="dotted">Dotted</option>
            </select>
          </div>
          <div class="style-row">
            <label class="style-label" for="borderColor">Color</label>
            <input type="color" id="borderColor" value="#000000" />
          </div>
        </div>
      </div>
    </div>

    <div id="theContainer"></div>

    <div id="rightPanel">
      <p class="panel-label">EDITOR</p>

      <div class="mode-buttons">
        <button id="modeEditor">Editor</button>
        <button id="modeAnchors">Anchors</button>
        <button id="modePlayer">Player</button>
      </div>

      <div class="selection-header">
        <p class="panel-label">SELECTION</p>
        <span id="selectionCount">0</span>
      </div>
      <div id="selectionList"></div>
      <p class="panel-hint">
        Click to select &nbsp;·&nbsp; Shift+click to add &nbsp;·&nbsp; Esc to
        clear
      </p>

      <div class="panel-divider"></div>

      <p class="panel-label">ANCHOR PICKED</p>
      <div id="anchorPicked">
        <span id="anchorPickedEmpty"
          >Switch to Anchors mode and click a handle.</span
        >
      </div>

      <div class="panel-divider"></div>

      <p class="panel-label">SERIALISATION</p>
      <button id="btnLogMemento" class="util-button">
        Log memento to console
      </button>

      <div class="panel-divider"></div>

      <p class="panel-label">SCROLL TRIGGERS</p>
      <div id="triggerHUD"></div>
    </div>
  </body>
</html>
