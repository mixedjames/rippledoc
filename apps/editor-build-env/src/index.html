<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Editor Build Env</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background: #e8e8e8;
        font-family: system-ui, sans-serif;
      }

      /* ── Toolbar ──────────────────────────────────────── */

      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        height: 40px;
        padding: 0 12px;
        background: #f5f5f5;
        border-bottom: 1px solid #d4d4d4;
      }

      .toolbar-divider {
        width: 1px;
        height: 20px;
        background: #d4d4d4;
        margin: 0 4px;
      }

      .toolbar-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 10px;
        border: 1px solid #c8c8c8;
        border-radius: 4px;
        background: #ffffff;
        color: #444444;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.1s,
          color 0.1s,
          border-color 0.1s;
        white-space: nowrap;
      }

      .toolbar-btn:hover:not(:disabled):not([data-active="true"]) {
        background: #eeeeee;
        color: #111111;
      }

      .toolbar-btn[data-active="true"] {
        background: hsl(220 70% 50%);
        color: #ffffff;
        border-color: hsl(220 70% 44%);
      }

      .toolbar-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ── Selection status ────────────────────────────── */

      #selectionStatus {
        margin-left: auto;
        font-size: 11px;
        color: #888888;
        white-space: nowrap;
      }

      /* ── Editor mount ─────────────────────────────────── */

      #editorMount {
        flex: 1;
        min-height: 0;
        position: relative;
      }

      /* Style the editor component's root so it fills the mount. */
      .rippledoc-editor {
        position: absolute;
        inset: 0;
      }

      .rippledoc-editor__canvas {
        position: absolute;
        inset: 0;
        overflow-y: scroll;
      }
    </style>
  </head>

  <body>
    <div id="toolbar">
      <button class="toolbar-btn" id="btnSingleSelect">Single Select</button>
      <button class="toolbar-btn" id="btnMultiSelect">Multi Select</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btnUndo">Undo</button>
      <button class="toolbar-btn" id="btnRedo">Redo</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btnNew">New Presentation</button>
      <span id="selectionStatus">Nothing selected</span>
    </div>

    <div id="editorMount"></div>
  </body>
</html>
